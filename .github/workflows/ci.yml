name: CI

on:
  push:
    branches: [master, main, "feature/**"]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all-targets

      - name: cargo audit
        run: |
          cargo install cargo-audit --quiet
          cargo audit

  c-layer:
    name: C plugin layer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpurple-dev libglib2.0-dev pkg-config gcc

      - name: Syntax-check C sources
        run: |
          gcc -Wall -Werror -Wextra -Wno-unused-parameter \
              -fPIC -O2 -fsyntax-only \
              $(pkg-config --cflags purple glib-2.0) \
              -I./plugin_src \
              plugin_src/matrix_core.c \
              plugin_src/matrix_account.c \
              plugin_src/matrix_blist.c \
              plugin_src/matrix_chat.c \
              plugin_src/matrix_commands.c \
              plugin_src/matrix_utils.c

      - name: C unit tests
        run: |
          bash tests/run_unit_tests

  full-build:
    name: Full plugin build
    runs-on: ubuntu-latest
    needs: [rust, c-layer]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpurple-dev libglib2.0-dev libssl-dev libsqlite3-dev \
            pkg-config gcc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build release plugin
        run: make
